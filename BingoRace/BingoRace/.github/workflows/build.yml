name: Build and Upload BingoRace

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn package -q
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: BingoRace
          path: target/BingoRace.jar
