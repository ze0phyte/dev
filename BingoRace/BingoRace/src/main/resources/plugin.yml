name: BingoRace
version: 1.0.0
main: com.bingorace.BingoRacePlugin
api-version: 1.20
description: Team or solo Bingo Race with world reset and GUI cards
authors: [You]

commands:
  br:
    description: BingoRace admin commands
    usage: /br <start|stop|join|leave|config|card>
    permission: bingorace.admin
  bingo:
    description: Open your bingo card
    usage: /bingo
    permission: bingorace.play
  bjoin:
    description: Join the bingo lobby
    usage: /bjoin
    permission: bingorace.play

permissions:
  bingorace.admin:
    description: Admin access
    default: op
  bingorace.play:
    description: Play bingo race
    default: true
