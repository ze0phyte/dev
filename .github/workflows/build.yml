name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn package -q
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ParasiteGame
          path: target/ParasiteGame.jarc